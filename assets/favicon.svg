<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <g fill="#2D2654">
    <!-- Main Interlocking F-R Monogram Structure -->
    <path d="M 400 50 
             L 890 50 
             L 805 135 
             L 535 135 
             L 535 220 
             L 760 220 
             C 860 220, 890 270, 890 355 
             C 890 440, 830 490, 730 490 
             L 535 490 
             L 535 390 
             L 715 390 
             C 770 390, 790 370, 790 345 
             C 790 320, 770 305, 715 305 
             L 400 305 
             Z" />
    
    <!-- Lower R Leg Structure -->
    <path d="M 590 425 
             L 775 600 
             L 900 600 
             L 695 410 
             Z" />
             
    <!-- Main Solid Vertical Stem Anchor -->
    <rect x="400" y="50" width="135" height="550" />

    <!-- Left Side Speed Lines & Dots (Top to Bottom) -->
    <!-- Line 1 (Top Flush) -->
    <rect x="270" y="50" width="135" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 2 -->
    <rect x="150" y="105" width="255" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 3 -->
    <rect x="210" y="160" width="195" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 4 & Floating Dot -->
    <rect x="23" y="215" width="115" height="25" rx="12.5" ry="12.5" />
    <rect x="270" y="215" width="130" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 5 & Dot -->
    <rect x="320" y="270" width="80" height="25" rx="12.5" ry="12.5" />
    <rect x="120" y="325" width="45" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 6 -->
    <rect x="200" y="325" width="200" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 7 & Trailing Stem Dot -->
    <rect x="365" y="380" width="35" height="25" rx="12.5" ry="12.5" />
    <rect x="365" y="420" width="35" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 8 -->
    <rect x="150" y="435" width="250" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 9 & Lower Stem Dot -->
    <rect x="285" y="490" width="45" height="25" rx="12.5" ry="12.5" />
    <rect x="365" y="490" width="35" height="25" rx="12.5" ry="12.5" />
    
    <!-- Line 10 (Bottom Trail) -->
    <rect x="240" y="545" width="65" height="25" rx="12.5" ry="12.5" />
    <rect x="340" y="545" width="60" height="25" rx="12.5" ry="12.5" />
  </g>
</svg>
